apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: webhook-workflow
  namespace: default
spec:
  components:
  - name: express-server
    type: webservice
    properties:
      image: oamdev/hello-world
      port: 8000
  workflow:
    steps:
    - name: application
      type: apply-component
      properties:
        component: express-server
    - name: webhook
      type: webhook
      properties:
        url:
          value: https://webhook.site/0d445fb8-691c-45d3-8e13-118f79083335
