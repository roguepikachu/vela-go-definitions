apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: vela-cli
  namespace: default
spec:
  components: []
  workflow:
    steps:
      - name: check-version
        type: vela-cli
        properties:
          command:
            - "vela"
            - "version"

      - name: list-apps
        type: vela-cli
        properties:
          command:
            - "vela"
            - "ls"
            - "-A"

      - name: get-workflow-status
        type: vela-cli
        properties:
          command:
            - "vela"
            - "workflow"
            - "ls"

      - name: custom-cli-command
        type: vela-cli
        properties:
          image: "oamdev/vela-cli:v1.9.0"
          command:
            - "vela"
            - "show"
          serviceAccountName: "kubevela-vela-core"
